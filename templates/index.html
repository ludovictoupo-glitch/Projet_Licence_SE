<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dobot Control Panel | Industrial OS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;500&display=swap"
        rel="stylesheet">

    <style>
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85));
            background-size: cover;
            background-attachment: fixed;
            font-family: 'Roboto', sans-serif;
            color: #e0e0e0;
            min-height: 100vh;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #00d4ff;
            text-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
            border-bottom: 2px solid #00d4ff;
            display: inline-block;
            padding-bottom: 10px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 25px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .stat-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
            margin-bottom: 10px;
        }

        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: bold;
        }

        .color-total {
            color: #eff7f8;
        }

        .color-red {
            color: #ff4b5c;
        }

        .color-blue {
            color: #3b82f6;
        }

        .color-green {
            color: #10b981;
        }

        .color-yellow {
            color: #f59e0b;
        }

        .btn-industrial {
            background: transparent;
            border: 2px solid #00d4ff;
            color: #00d4ff;
            font-family: 'Orbitron', sans-serif;
            padding: 15px 40px;
            font-size: 1.2rem;
            transition: all 0.3s;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
        }

        .btn-industrial:hover {
            background: #00d4ff;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.6);
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            background-color: #10b981;
            box-shadow: 0 0 10px #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }

            100% {
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h1>Industrial Control DOBOT</h1>
                <p class="text-muted small mb-0">ID: DOBOT-MAGICIAN | PROJET LICENCE</p>
            </div>
            <div class="text-end">
                <span id="sys-indicator" class="status-indicator"></span>
                <small id="sys-text" style="color: #10b981;">SYSTEM ONLINE</small>
            </div>
        </div>

        <div class="row g-4 mb-5">
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-label">TRI Total</div>
                    <div class="stat-value color-total" id="count-total">0</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-label">CUBE Rouge</div>
                    <div class="stat-value color-red" id="count-rouge">0</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-label">CUBE Bleu</div>
                    <div class="stat-value color-blue" id="count-bleu">0</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-label">CUBE Vert</div>
                    <div class="stat-value color-green" id="count-vert">0</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-label">CUBE jaune</div>
                    <div class="stat-value color-yellow" id="count-jaune">0</div>
                </div>
            </div>
        </div>

        <div class="text-center mt-5">
            <button id="btnStart" class="btn btn-industrial me-2"> DEMARRER LE TRI DOBOT </button>
            <button onclick="stopRobot()" class="btn btn-danger px-4 py-3 me-2"
                style="font-family: 'Orbitron', sans-serif;"> ARRÊTER LE CYCLE </button>
            <button onclick="resetStats()" class="btn btn-warning px-4 py-3"
                style="font-family: 'Orbitron', sans-serif;"> RÉINITIALISER STATS </button>
        </div>
    </div>

    <script>
        // Fonction pour mettre à jour les statistiques globales (SQLite)
        function updateDashboard() {
            fetch('/get_stats')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('count-total').innerText = data.total;
                    document.getElementById('count-rouge').innerText = data.rouge;
                    document.getElementById('count-bleu').innerText = data.bleu;
                    document.getElementById('count-vert').innerText = data.vert;
                    document.getElementById('count-jaune').innerText = data.jaune;
                })
                .catch(err => console.error("Erreur de liaison serveur stats: ", err));
        }

        // Écouteur d'événement direct sur le bouton Start (plus de fonction enveloppe inutile)
        document.getElementById('btnStart').addEventListener('click', function () {
            const btn = this;
            btn.innerHTML = "<span> </span> En cours de tri...";
            btn.style.borderColor = "#ffc107";
            btn.style.color = "#ffc107";
            btn.disabled = true;

            fetch('/start_robot', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    console.log("Ordre de démarrage envoyé :", data.status);
                    document.getElementById('sys-text').innerText = "ROBOT EN ACTION";
                    document.getElementById('sys-text').style.color = "#ffc107";
                    document.getElementById('sys-indicator').style.backgroundColor = "#ffc107";
                    document.getElementById('sys-indicator').style.boxShadow = "0 0 10px #ffc107";
                })
                .catch(err => {
                    console.error("Erreur lors de l'envoi du start:", err);
                    btn.innerHTML = " DEMARRER LE TRI DOBOT ";
                    btn.disabled = false;
                });
        });

        // Fonction d'arrêt d'urgence
        function stopRobot() {
            fetch('/stop_robot', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    console.log("Ordre d'arrêt envoyé");
                    document.getElementById('sys-text').innerText = "ROBOT ARRÊTÉ";
                    document.getElementById('sys-text').style.color = "#ff4b5c";
                    document.getElementById('sys-indicator').style.backgroundColor = "#ff4b5c";
                    document.getElementById('sys-indicator').style.boxShadow = "0 0 10px #ff4b5c";
                })
                .catch(err => console.error("Erreur arrêt:", err));
        }

        // Réinitialisation des statistiques
        function resetStats() {
            if (confirm("Voulez-vous vraiment remettre les compteurs à zéro ?")) {
                fetch('/reset_stats', { method: 'POST' })
                    .then(response => response.json())
                    .then(data => {
                        document.getElementById('count-total').innerText = data.total || 0;
                        document.getElementById('count-rouge').innerText = data.rouge || 0;
                        document.getElementById('count-bleu').innerText = data.bleu || 0;
                        document.getElementById('count-vert').innerText = data.vert || 0;
                        document.getElementById('count-jaune').innerText = data.jaune || 0;
                        console.log("Statistiques réinitialisées");
                    })
                    .catch(err => console.error("Erreur lors du reset:", err));
            }
        }

        // Surveillance de l'état du robot en continu (toutes les 2 secondes)
        setInterval(() => {
            fetch('/get_status')
                .then(res => res.json())
                .then(data => {
                    const btn = document.getElementById('btnStart');

                    if (data.moving === true) {
                        // Si le système est actif, on verrouille le bouton visuellement
                        btn.innerHTML = "<span> </span> En cours de tri...";
                        btn.style.borderColor = "#ffc107";
                        btn.style.color = "#ffc107";
                        btn.disabled = true;

                        document.getElementById('sys-text').innerText = "ROBOT EN ACTION";
                        document.getElementById('sys-text').style.color = "#ffc107";
                        document.getElementById('sys-indicator').style.backgroundColor = "#ffc107";
                        document.getElementById('sys-indicator').style.boxShadow = "0 0 10px #ffc107";
                    } else {
                        // Si le système est arrêté (après un STOP), on libère le bouton
                        btn.innerHTML = " DEMARRER LE TRI DOBOT ";
                        btn.style.borderColor = "#00d4ff";
                        btn.style.color = "#00d4ff";
                        btn.disabled = false;

                        document.getElementById('sys-text').innerText = "SYSTEM ONLINE";
                        document.getElementById('sys-text').style.color = "#10b981";
                        document.getElementById('sys-indicator').style.backgroundColor = "#10b981";
                        document.getElementById('sys-indicator').style.boxShadow = "0 0 10px #10b981";
                    }
                })
                .catch(err => console.error("Erreur statut :", err));
        }, 2000);

        // Rafraîchissement automatique des compteurs
        setInterval(updateDashboard, 2000);
        updateDashboard();
    </script>
</body>

</html>
